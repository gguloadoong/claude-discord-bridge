<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROL ROOM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-0:#06080c;--bg-1:#0a0d12;--bg-2:#0f1319;--bg-3:#141820;
  --border:#1a1f2a;--border-hi:#252b38;
  --text-0:#e8ecf1;--text-1:#a4adb8;--text-2:#6b7585;--text-3:#3d4555;
  --blue:#3b8eea;--blue-dim:#1a2d4a;
  --green:#2dd4a0;--green-dim:#0d2e25;
  --amber:#e8a830;--amber-dim:#2a2010;
  --red:#ef5350;--red-dim:#2a1215;
  --purple:#a78bfa;--purple-dim:#1e1533;
  --cyan:#22d3ee;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans KR',system-ui,sans-serif;
}

html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg-0);color:var(--text-0)}

/* ===== TOP BAR ===== */
.topbar{
  height:40px;background:var(--bg-1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{
  font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:3px;color:var(--text-2);text-transform:uppercase;
}
.topbar-divider{width:1px;height:16px;background:var(--border)}
.topbar-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2)}
.topbar-right{display:flex;align-items:center;gap:16px;font-family:var(--mono);font-size:11px;color:var(--text-2)}
.topbar-clock{color:var(--text-1);font-weight:500;font-size:12px;letter-spacing:1px}

/* Status dot */
.sd{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.sd.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.sd.work{background:var(--blue);box-shadow:0 0 8px var(--blue)}
.sd.think{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.sd.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.sd.idle{background:var(--text-3)}

/* ===== ALERTS STRIP ===== */
.alerts-strip{
  flex-shrink:0;display:flex;gap:8px;padding:6px 20px;
  background:var(--bg-0);min-height:0;
}
.alerts-strip:empty{display:none;padding:0}
.alert-pill{
  font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:4px;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.alert-pill.err{background:var(--red-dim);color:var(--red);border:1px solid #f8514920}
.alert-pill.warn{background:var(--amber-dim);color:var(--amber);border:1px solid #e8a83020}

/* ===== 3-COLUMN GRID ===== */
.grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;
  flex:1;overflow:hidden;min-height:0;
}
.col{
  display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border);
}
.col:last-child{border-right:none}

/* Column header */
.col-hdr{
  flex-shrink:0;padding:12px 16px 10px;
  background:var(--bg-1);border-bottom:1px solid var(--border);
}
.col-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.col-name{display:flex;align-items:center;gap:8px}
.col-icon{font-size:16px}
.col-title{font-size:14px;font-weight:700;letter-spacing:-0.2px}
.col-status{
  font-family:var(--mono);font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;
}
.col-status.working{background:var(--blue-dim);color:var(--blue)}
.col-status.thinking{background:var(--amber-dim);color:var(--amber)}
.col-status.idle{background:var(--bg-3);color:var(--text-3)}
.col-status.offline{background:var(--red-dim);color:var(--red)}

/* Stats strip */
.col-stats{display:flex;gap:2px}
.col-stat{
  flex:1;background:var(--bg-2);padding:5px 6px;text-align:center;
  border-radius:3px;
}
.col-stat:first-child{border-radius:3px 0 0 3px}
.col-stat:last-child{border-radius:0 3px 3px 0}
.cs-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text-0);line-height:1}
.cs-val.err{color:var(--red)}
.cs-lbl{font-size:8px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-family:var(--mono)}

/* Live bar (agent/tool) */
.live-bar{
  flex-shrink:0;padding:6px 16px;background:var(--bg-2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;min-height:28px;flex-wrap:wrap;
}
.live-bar:empty{display:none}
.ltag{
  font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;
  display:inline-flex;align-items:center;gap:3px;white-space:nowrap;
}
.ltag.agent{background:var(--blue-dim);color:var(--blue)}
.ltag.tool{background:var(--bg-3);color:var(--text-1)}
.ltag.branch{background:#0d1f2e;color:var(--cyan)}
.ltag.ctx{background:var(--bg-3);color:var(--text-2)}

/* Context gauge */
.ctx-gauge{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--text-3)}
.ctx-track{width:40px;height:3px;background:var(--bg-0);border-radius:2px;overflow:hidden}
.ctx-fill{height:100%;border-radius:2px;transition:width .5s ease}
.ctx-fill.lo{background:var(--green)}.ctx-fill.md{background:var(--amber)}.ctx-fill.hi{background:var(--red)}

/* ===== SCROLLABLE CONTENT ===== */
.col-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-track{background:transparent}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.col-body::-webkit-scrollbar-thumb:hover{background:var(--border-hi)}

/* Work unit — request/response pair */
.wu{background:var(--bg-2);border-radius:6px;border:1px solid var(--border);overflow:hidden}
.wu-req{padding:8px 10px;border-left:3px solid var(--blue)}
.wu-req-text{font-size:12px;color:var(--text-0);line-height:1.5}
.wu-req-meta{display:flex;justify-content:space-between;margin-top:3px}
.wu-req-user{font-family:var(--mono);font-size:9px;color:var(--blue);font-weight:500}
.wu-req-time{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.wu-resp{padding:8px 10px;background:var(--bg-1);border-left:3px solid var(--green-dim)}
.wu-resp-text{font-size:11px;color:var(--text-1);line-height:1.5}
.wu-resp-meta{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:2px}
.wu-pending{
  padding:5px 10px;font-family:var(--mono);font-size:10px;
  color:var(--amber);background:var(--amber-dim);
  display:flex;align-items:center;gap:5px;
}
.wu-pending .spinner{display:inline-block;width:8px;height:8px;border:1.5px solid var(--amber);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}

/* Git section */
.git-section{background:var(--bg-2);border-radius:6px;border:1px solid var(--border);padding:8px 10px}
.git-hdr{font-family:var(--mono);font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.git-item{font-size:11px;color:var(--text-1);padding:2px 0;display:flex;align-items:baseline;gap:5px;line-height:1.4}
.git-bullet{color:var(--text-3);flex-shrink:0}
.pr-tag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0}
.pr-tag.open{background:var(--green-dim);color:var(--green)}
.pr-tag.merged{background:var(--purple-dim);color:var(--purple)}
.issue-tag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;background:var(--amber-dim);color:var(--amber)}

/* Discord link in header */
.dc-link{
  font-family:var(--mono);font-size:9px;color:#5865F2;text-decoration:none;
  padding:1px 5px;border-radius:3px;background:#5865F215;
  transition:background .15s;
}
.dc-link:hover{background:#5865F230}

/* Empty state */
.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;color:var(--text-3);font-size:12px;
}

/* Section label inside col */
.sec-label{
  font-family:var(--mono);font-size:9px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:1px;padding:4px 2px 2px;
}

/* ===== BOTTOM BAR ===== */
.bottombar{
  flex-shrink:0;height:28px;background:var(--bg-1);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  font-family:var(--mono);font-size:10px;color:var(--text-3);
}
.bottombar-left{display:flex;align-items:center;gap:16px}
.bottombar-right{display:flex;align-items:center;gap:12px}
.refresh-dot{width:4px;height:4px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s}
.refresh-dot.flash{opacity:1}

/* ===== ANIMATIONS ===== */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse-glow 2s ease-in-out infinite}
@keyframes slide-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.wu{animation:slide-in .2s ease-out}

/* ===== TIME FILTER (minimal strip) ===== */
.filter-strip{
  flex-shrink:0;display:flex;align-items:center;gap:4px;padding:4px 20px;
  background:var(--bg-0);border-bottom:1px solid var(--border);
}
.filter-label{font-family:var(--mono);font-size:9px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-right:4px}
.fbtn{
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;
  border:1px solid transparent;background:transparent;color:var(--text-2);
  cursor:pointer;transition:all .1s;
}
.fbtn:hover{color:var(--text-1);background:var(--bg-2)}
.fbtn.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

/* ===== LAYOUT SHELL ===== */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
</style>
</head>
<body>

<div class="shell">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Control Room</span>
      <div class="topbar-divider"></div>
      <div class="topbar-indicator">
        <span class="sd idle" id="g-dot"></span>
        <span id="g-status">--</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="g-uptime">--</span>
      <div class="topbar-divider"></div>
      <span class="topbar-clock" id="g-clock">--:--:--</span>
    </div>
  </div>

  <!-- ALERTS -->
  <div class="alerts-strip" id="alerts"></div>

  <!-- TIME FILTER -->
  <div class="filter-strip">
    <span class="filter-label">Period</span>
    <button class="fbtn" data-h="1">1h</button>
    <button class="fbtn" data-h="3">3h</button>
    <button class="fbtn on" data-h="24">Today</button>
    <button class="fbtn" data-h="0">All</button>
  </div>

  <!-- 3-COLUMN GRID -->
  <div class="grid" id="grid"></div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <div class="bottombar-left">
      <span><span class="refresh-dot" id="r-dot"></span> 5s auto-refresh</span>
      <span id="b-msgs">--</span>
    </div>
    <div class="bottombar-right">
      <span id="b-last">--</span>
    </div>
  </div>
</div>

<script>
const PROJECTS = ['market', 'shorts', 'general']
const ICONS = { market: '\u{1F4CA}', shorts: '\u{1F3AC}', general: '\u{1F3E0}' }
const NAMES = { market: '\ub9c8\ucf13\ub808\uc774\ub354 v5', shorts: '\uc1fc\uce20', general: '\uc81c\ub108\ub7f4' }
const ST_KR = { working: '\uc791\uc5c5\uc911', thinking: '\uc0dd\uac01\uc911', idle: '\ub300\uae30', offline: '\uc624\ud504\ub77c\uc778' }

let mon = {}, sts = { channels: [], recentMessages: [], uptime: 0, guildId: '' }, filterH = 24

// --- Helpers ---
function ta(ts) {
  if (!ts) return ''
  const s = Math.floor((Date.now() - ts) / 1000)
  if (s < 10) return '\ubc29\uae08'
  if (s < 60) return s + '\ucd08 \uc804'
  const m = Math.floor(s / 60)
  if (m < 60) return m + '\ubd84 \uc804'
  const h = Math.floor(m / 60)
  if (h < 24) return h + '\uc2dc\uac04 \uc804'
  return Math.floor(h / 24) + '\uc77c \uc804'
}
function hm(ts) {
  const d = new Date(ts)
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0')
}
function up(s) { return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm' }
function trunc(s, n) { return s && s.length > n ? s.slice(0, n - 1) + '\u2026' : s || '' }
function cutoff() { return filterH === 0 ? 0 : Date.now() - filterH * 3600 * 1000 }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

// --- Work units ---
function buildWorkUnits(slug) {
  const msgs = (sts.recentMessages || []).filter(m => m.slug === slug && m.time >= cutoff())
  const units = []
  let i = 0
  while (i < msgs.length) {
    const m = msgs[i]
    if (!m.isReply) {
      const unit = { req: m, responses: [] }
      i++
      while (i < msgs.length && msgs[i].isReply && msgs[i].slug === slug) {
        unit.responses.push(msgs[i]); i++
      }
      units.push(unit)
    } else {
      units.push({ req: null, responses: [m] }); i++
    }
  }
  return units.reverse()
}

// --- Time filter ---
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'))
    btn.classList.add('on')
    filterH = parseInt(btn.dataset.h)
    render()
  })
})

// --- Clock ---
function tickClock() {
  const d = new Date()
  document.getElementById('g-clock').textContent =
    String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0') + ':' +
    String(d.getSeconds()).padStart(2, '0')
}
setInterval(tickClock, 1000)
tickClock()

// --- Alerts ---
function renderAlerts() {
  const el = document.getElementById('alerts')
  const pills = []
  sts.channels.forEach(ch => {
    const m = mon[ch.slug] || {}
    if (!ch.online) pills.push({ c: 'err', t: ch.name + ' \uc11c\ubc84 \uc624\ud504\ub77c\uc778' })
    if (m.context > 80) pills.push({ c: 'warn', t: ch.name + ' CTX ' + m.context + '% \u2014 \uc7ac\uc2dc\uc791 \ud544\uc694' })
    if (ch.errors > 3) pills.push({ c: 'warn', t: ch.name + ' \uc5d0\ub7ec ' + ch.errors + '\uac74' })
  })
  el.innerHTML = pills.map(p => '<div class="alert-pill ' + p.c + '">' + esc(p.t) + '</div>').join('')
}

// --- Render columns ---
function renderGrid() {
  const el = document.getElementById('grid')
  const html = sts.channels.map(ch => {
    const m = mon[ch.slug] || {}
    const gh = m.github || null
    const icon = ICONS[ch.slug] || '\u{1F4C2}'
    const st = !ch.online ? 'offline' : (m.state || 'idle')
    const pulseClass = (st === 'working' || st === 'thinking') ? ' pulse' : ''
    const gid = sts.guildId
    const dcLink = gid ? 'https://discord.com/channels/' + gid + '/' + ch.id : '#'

    // --- Column header ---
    let hdr = '<div class="col-hdr">'
    hdr += '<div class="col-hdr-top">'
    hdr += '<div class="col-name"><span class="col-icon">' + icon + '</span><span class="col-title">' + esc(ch.name) + '</span>'
    hdr += ' <a class="dc-link" href="' + dcLink + '" target="_blank">Discord</a></div>'
    hdr += '<span class="col-status ' + st + pulseClass + '">' + ST_KR[st] + '</span>'
    hdr += '</div>'

    // Stats strip
    hdr += '<div class="col-stats">'
    hdr += '<div class="col-stat"><div class="cs-val">' + ch.messagesToday + '</div><div class="cs-lbl">\uba54\uc2dc\uc9c0</div></div>'
    hdr += '<div class="col-stat"><div class="cs-val' + (ch.errors > 0 ? ' err' : '') + '">' + ch.errors + '</div><div class="cs-lbl">\uc5d0\ub7ec</div></div>'
    if (gh) {
      hdr += '<div class="col-stat"><div class="cs-val">' + gh.commitsToday + '</div><div class="cs-lbl">\ucee4\ubc0b</div></div>'
      hdr += '<div class="col-stat"><div class="cs-val">' + (gh.openPRs ? gh.openPRs.length : 0) + '</div><div class="cs-lbl">PR</div></div>'
      hdr += '<div class="col-stat"><div class="cs-val">' + (gh.openIssues ? gh.openIssues.length : 0) + '</div><div class="cs-lbl">\uc774\uc288</div></div>'
      if (gh.changedFiles > 0) {
        hdr += '<div class="col-stat"><div class="cs-val" style="color:var(--amber)">' + gh.changedFiles + '</div><div class="cs-lbl">\ubcc0\uacbd</div></div>'
      }
    }
    hdr += '</div>'
    hdr += '</div>'

    // --- Live bar ---
    let live = '<div class="live-bar">'
    let hasLive = false
    if (m.agent) { live += '<span class="ltag agent">' + esc(m.agent) + '</span>'; hasLive = true }
    if (m.tool) {
      live += '<span class="ltag tool">' + esc(m.tool) + (m.toolDetail ? ': ' + esc(trunc(m.toolDetail, 20)) : '') + '</span>'
      hasLive = true
    }
    if (gh && gh.branch && gh.branch !== 'main') {
      live += '<span class="ltag branch">' + esc(gh.branch) + '</span>'
      hasLive = true
    }
    if (m.context != null) {
      const cls = m.context < 50 ? 'lo' : m.context < 80 ? 'md' : 'hi'
      live += '<div class="ctx-gauge">CTX <div class="ctx-track"><div class="ctx-fill ' + cls + '" style="width:' + m.context + '%"></div></div>' + m.context + '%</div>'
      hasLive = true
    }
    if (m.session) {
      live += '<span class="ltag ctx">' + esc(m.session) + '</span>'
      hasLive = true
    }
    live += '</div>'
    if (!hasLive) live = ''

    // --- Body content ---
    let body = '<div class="col-body">'

    // Work units (conversations)
    const units = buildWorkUnits(ch.slug)
    if (units.length > 0) {
      body += '<div class="sec-label">\ub300\ud654</div>'
      units.slice(0, 5).forEach(u => {
        body += '<div class="wu">'
        if (u.req) {
          body += '<div class="wu-req"><div class="wu-req-text">' + esc(u.req.preview) + '</div>'
          body += '<div class="wu-req-meta"><span class="wu-req-user">' + esc(u.req.user) + '</span>'
          body += '<span class="wu-req-time">' + hm(u.req.time) + ' \u00b7 ' + ta(u.req.time) + '</span></div></div>'
        }
        if (u.responses.length > 0) {
          u.responses.forEach(r => {
            body += '<div class="wu-resp"><div class="wu-resp-text">' + esc(trunc(r.preview, 150)) + '</div>'
            body += '<div class="wu-resp-meta">' + hm(r.time) + '</div></div>'
          })
        } else if (u.req) {
          body += '<div class="wu-pending"><span class="spinner"></span> \uc751\ub2f5 \ub300\uae30\uc911\u2026</div>'
        }
        body += '</div>'
      })
    } else {
      body += '<div class="empty-state">\uc774 \uae30\uac04\uc5d0 \ub300\ud654 \uc5c6\uc74c</div>'
    }

    // Git: recent commits
    if (gh && gh.recentCommits && gh.recentCommits.length > 0) {
      body += '<div class="sec-label">\uc791\uc5c5 \ub0b4\uc5ed</div>'
      body += '<div class="git-section">'
      gh.recentCommits.slice(0, 4).forEach(c => {
        body += '<div class="git-item"><span class="git-bullet">\u2022</span>' + esc(c) + '</div>'
      })
      body += '</div>'
    }

    // Git: open PRs
    if (gh && gh.openPRs && gh.openPRs.length > 0) {
      body += '<div class="sec-label">\uc9c4\ud589\uc911 PR</div>'
      body += '<div class="git-section">'
      gh.openPRs.forEach(p => {
        body += '<div class="git-item"><span class="pr-tag open">#' + p.number + '</span>' + esc(p.title) + '</div>'
      })
      body += '</div>'
    }

    // Git: merged PRs
    if (gh && gh.mergedPRs && gh.mergedPRs.length > 0) {
      body += '<div class="sec-label">\uc644\ub8cc PR</div>'
      body += '<div class="git-section">'
      gh.mergedPRs.slice(0, 3).forEach(p => {
        body += '<div class="git-item"><span class="pr-tag merged">#' + p.number + '</span>' + esc(p.title) + '</div>'
      })
      body += '</div>'
    }

    // Git: open issues
    if (gh && gh.openIssues && gh.openIssues.length > 0) {
      body += '<div class="sec-label">\uc5f4\ub9b0 \uc774\uc288</div>'
      body += '<div class="git-section">'
      gh.openIssues.slice(0, 4).forEach(issue => {
        body += '<div class="git-item"><span class="issue-tag">#' + issue.number + '</span>' + esc(issue.title) + '</div>'
      })
      body += '</div>'
    }

    body += '</div>'

    return '<div class="col">' + hdr + live + body + '</div>'
  }).join('')

  el.innerHTML = html
}

// --- Global status ---
function updateGlobal() {
  const dot = document.getElementById('g-dot')
  const txt = document.getElementById('g-status')
  const on = sts.channels.filter(c => c.online).length
  const tot = sts.channels.length
  const wrk = Object.values(mon).filter(m => m.state === 'working' || m.state === 'thinking').length

  if (on === 0) { dot.className = 'sd off'; txt.textContent = '\uc804\uccb4 \uc624\ud504\ub77c\uc778' }
  else if (wrk > 0) { dot.className = 'sd work pulse'; txt.textContent = wrk + '\uac1c \uc791\uc5c5\uc911' }
  else if (on === tot) { dot.className = 'sd on'; txt.textContent = '\uc804\uccb4 \uc628\ub77c\uc778' }
  else { dot.className = 'sd think'; txt.textContent = on + '/' + tot + ' \uc628\ub77c\uc778' }

  document.getElementById('g-uptime').textContent = 'UP ' + up(sts.uptime)

  // Bottom bar
  const totalMsgs = sts.channels.reduce((a, c) => a + (c.messagesToday || 0), 0)
  document.getElementById('b-msgs').textContent = '\uc624\ub298 \uba54\uc2dc\uc9c0 ' + totalMsgs + '\uac74'

  const allLast = sts.channels.map(c => c.lastMessage?.time || 0).filter(Boolean)
  if (allLast.length) {
    document.getElementById('b-last').textContent = '\ub9c8\uc9c0\ub9c9 \ud65c\ub3d9 ' + ta(Math.max(...allLast))
  }
}

function render() {
  renderAlerts()
  renderGrid()
  updateGlobal()
}

// --- Fetch data ---
async function refresh() {
  try {
    const [s, m] = await Promise.all([
      fetch('/api/status').then(r => r.json()).catch(() => null),
      fetch('http://127.0.0.1:8899/api/monitor').then(r => r.json()).catch(() => ({}))
    ])
    if (s) sts = s
    mon = m || {}
    render()

    // Flash refresh indicator
    const rd = document.getElementById('r-dot')
    rd.classList.add('flash')
    setTimeout(() => rd.classList.remove('flash'), 600)
  } catch {
    document.getElementById('g-dot').className = 'sd off'
    document.getElementById('g-status').textContent = '\uc5f0\uacb0 \ub04a\uae40'
  }
}

setInterval(refresh, 5000)
refresh()
</script>
